<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trident Inc — Mobile Apps Developer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont,
                         'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #7C4DFF 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 680px;
            width: 100%;
            text-align: center;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 18px;
            opacity: 0.75;
            margin-bottom: 48px;
        }

        .apps-section h2 {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 20px;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
            text-align: left;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, background 0.2s;
        }

        .app-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
        }

        .app-icon {
            font-size: 52px;
            flex-shrink: 0;
        }

        .app-info h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .app-info p {
            font-size: 14px;
            opacity: 0.7;
            line-height: 1.4;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            margin-top: 8px;
        }

        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #1A1A2E;
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            margin-top: 12px;
            transition: opacity 0.2s;
        }

        .play-btn:hover {
            opacity: 0.85;
        }

        .links {
            margin-top: 48px;
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .links a:hover {
            color: white;
        }

        footer {
            margin-top: 48px;
            font-size: 13px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Developer Identity -->
        <div class="icon">👨‍💻</div>
        <h1>Trident Inc</h1>
        <p class="tagline">Mobile Apps Developer</p>

        <!-- Apps Section -->
        <div class="apps-section">
            <h2>Our Apps</h2>

            <div class="app-card">
                <div class="app-icon">⭕</div>
                <div class="app-info">
                    <h3>Tic Tac Toe: Classic Board Game</h3>
                    <p>Play against a smart AI or challenge a friend.
                       5 themes, smooth animations and sound effects.</p>
                    <span class="badge">🎮 Board Game</span>
                    <br>
                    <!-- Replace # with your actual Play Store URL -->
                    <a class="play-btn"
                       href="https://play.google.com/store/apps/details?id=com.kks.app.tictactoe"
                       target="_blank">
                        ▶ Get it on Google Play
                    </a>
                </div>
            </div>

            <!-- Add more app cards here as you publish more apps -->

        </div>

        <!-- Links -->
        <div class="links">
            <a href="https://sites.google.com/view/tictactoe-game-policy/home">Privacy Policy</a>
            <a href="mailto:trident.inc01@email.com">Contact</a>
            <a href="/app-ads.txt">app-ads.txt</a>
        </div>

        <footer>
            <p>© 2026 Trident Inc. All rights reserved.</p>
        </footer>

    </div>
</body>
</html>
